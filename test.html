<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SecureED Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: #111;">
  <video id="video" controls width="80%" style="border-radius: 12px; box-shadow: 0 0 20px rgba(0,0,0,0.5);"></video>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById('video');
      const lessonId = "a1f489fe-5e95-4077-986a-e18fb44cc984"; // your lesson ID
      const videoUrl = `http://localhost:3000/bucket/videos/${lessonId}/index.m3u8`;

      if (Hls.isSupported()) {
        const hls = new Hls({
          // optional: better error handling & retry settings
          maxBufferLength: 60,
          xhrSetup: (xhr, url) => {
            // optionally attach JWT for secure key requests later
            // xhr.setRequestHeader('Authorization', 'Bearer <token>');
          }
        });

        hls.loadSource(videoUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          console.log("HLS manifest loaded");
          video.play();
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
          console.error("HLS error:", data);
        });

      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari native HLS support
        video.src = videoUrl;
      } else {
        alert("Your browser does not support HLS playback.");
      }
    });
  </script>
</body>
</html>
